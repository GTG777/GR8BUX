  NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzcXJyYnRkdnliZ3F1Zm9hbnRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzA1MTEsImV4cCI6MjA4OTkwNjUxMX0.4Mr8tDST7uVdZk6xkcdHvkPHMlW3lkPDp0EOBPwCx20"
