# Netlify Configuration for Trading Journal App

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18.17.0"
  # All secrets and API keys must be set via the Netlify dashboard:
  # Site settings → Environment variables
  # DO NOT hardcode secrets here — this file is committed to source control.
  #
  # Required variables to configure in Netlify dashboard:
  #   NEXT_PUBLIC_SUPABASE_URL
  #   NEXT_PUBLIC_SUPABASE_ANON_KEY
  #   SUPABASE_SERVICE_ROLE_KEY   ← rotate this key immediately (was exposed on GitHub)
  #   ALPHAVANTAGE_API_KEY

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache immutable static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
