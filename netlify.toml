# Netlify Configuration for Trading Journal App

[functions]
  timeout = 26

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20.19.0"
  # All secrets and API keys must be set via the Netlify dashboard:
  # Site settings → Environment variables
  # DO NOT hardcode secrets here — this file is committed to source control.
  #
  # Required variables to configure in Netlify dashboard:
  #   NEXT_PUBLIC_SUPABASE_URL
  #   NEXT_PUBLIC_SUPABASE_ANON_KEY
  #   SUPABASE_SERVICE_ROLE_KEY   ← rotate this key immediately (was exposed on GitHub)
  #   ALPHAVANTAGE_API_KEY
  #   MASSIVE_API_KEY

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions."refresh-coach-context"]
  # Every 30 min — pre-computes compact portfolio summaries for all users
  schedule = "*/30 * * * *"

[functions."nightly-coach-brief"]
  # Nightly at midnight CT (05:00 UTC) — generates behavioral brief per user
  schedule = "0 5 * * *"

[functions."refresh-market-data"]
  # Every 15 min Mon-Fri 9AM-5PM ET (14:00-22:00 UTC)
  # Also nightly at 11 PM ET (04:00 UTC) to seed data before market open
  schedule = "*/15 14-22 * * 1-5"

[functions."refresh-ai-analyses"]
  # Every 30 min Mon-Fri 9AM-5PM ET (14:00-22:00 UTC)
  # Also nightly at 11:30 PM ET (04:30 UTC) to refresh AI signals overnight
  schedule = "*/30 14-22 * * 1-5"

[functions."nightly-refresh-market-data"]
  # Nightly at 11 PM ET (04:00 UTC Tue-Sat = after Mon-Fri market close)
  schedule = "0 4 * * 2-6"

[functions."nightly-refresh-ai-analyses"]
  # Nightly at 11:30 PM ET (04:30 UTC Tue-Sat)
  schedule = "30 4 * * 2-6"

[functions."nightly-refresh-earnings-enrichment"]
  # Nightly at 11:45 PM ET / 10:45 PM CST (04:45 UTC Tue-Sat)
  schedule = "45 4 * * 2-6"

[functions."earnings-enrichment-afternoon"]
  # 4:00 PM CST (22:00 UTC Mon-Fri)
  schedule = "0 22 * * 1-5"

[functions."earnings-enrichment-evening"]
  # 7:30 PM CST (01:30 UTC Tue-Sat)
  schedule = "30 1 * * 2-6"

[functions."intraday-scan-setups"]
  # Every 15 min Mon-Fri 9:30 AM–4:00 PM ET (13:30–21:00 UTC)
  schedule = "*/15 13-21 * * 1-5"

[functions."intraday-scan-prebreakout"]
  # Every 15 min Mon-Fri 9:30 AM–4:00 PM ET (13:30–21:00 UTC)
  schedule = "*/15 13-21 * * 1-5"

[functions."intraday-scan-onwatch"]
  # Every 15 min Mon-Fri 9:30 AM–4:00 PM ET (13:30–21:00 UTC)
  schedule = "*/15 13-21 * * 1-5"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache immutable static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never let Cloudflare or any CDN cache API responses
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Pragma = "no-cache"
