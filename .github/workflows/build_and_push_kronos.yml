name: Build and push Kronos service image

on:
  workflow_dispatch:
  push:
    paths:
      - 'python-kronos-service/**'
      - 'kronos/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: python-kronos-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gr8bux-kronos:latest
          build-args: |
            INSTALL_TORCH_CPU=true
            KRONOS_GIT_URL=

      - name: Image info
        run: echo "Image pushed to ghcr.io/${{ github.repository_owner }}/gr8bux-kronos:latest"
